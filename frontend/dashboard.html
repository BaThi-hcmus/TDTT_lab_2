<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Quản trị viên</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ADMIN.IO</div>
        <div class="user-nav">
            <div id="userProfile" class="user-profile-btn">
                <span id="userName">Đang tải...</span>
                <span class="arrow">▼</span>
            </div>
            <button id="logoutBtn" class="btn btn-logout">Đăng xuất</button>
        </div>
    </nav>

    <!-- Modal thông tin user -->
    <div id="userModal" class="user-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Thông tin tài khoản</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <div class="profile-info">
                    <div class="info-row">
                        <span class="info-label">Họ tên</span>
                        <span class="info-value" id="profileName">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Email</span>
                        <span class="info-value" id="profileEmail">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Vai trò</span>
                        <span class="info-value" id="profileRole">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Username</span>
                        <span class="info-value" id="profileUsername">--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="main-content">
        <section class="welcome-section">
            <h1>Chào buổi tối, <span id="welcomeName">Admin</span>! 👋</h1>
            <p style="color: var(--text-muted);">Đây là tổng quan về hoạt động của cửa hàng.</p>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Tổng sản phẩm</h3>
                <div class="value" id="productCount">--</div>
                <button class="btn btn-primary">Quản lý kho</button>
            </div>
            <div class="stat-card">
                <h3>Đơn hàng mới</h3>
                <div class="value">0</div>
                <button class="btn" style="background: #f1f5f9; color: var(--text-main);">Xem đơn hàng</button>
            </div>
            <div class="stat-card">
                <h3>Doanh thu</h3>
                <div class="value">0đ</div>
                <button class="btn" style="background: #f1f5f9; color: var(--text-main);">Báo cáo</button>
            </div>
        </section>
    </main>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
